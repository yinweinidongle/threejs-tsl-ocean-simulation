<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js TSL/WebGPU 逼真海洋模拟 - Seedance Style</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; color: white; z-index: 100; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; font-size: 14px; }
        #controls { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; color: white; z-index: 100; width: 260px; }
        .control-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 13px; }
        input[type="range"] { width: 100%; }
        #status { position: absolute; bottom: 10px; left: 10px; color: #0f0; font-size: 12px; z-index: 100; }
    </style>
</head>
<body>
    <div id="info">
        <strong>Three.js + TSL/WebGPU 海洋模拟</strong><br>
        鼠标拖拽旋转 | 滚轮缩放 | 空格切换自动旋转<br>
        点击水面添加涟漪 (实验性)
    </div>
    
    <div id="controls">
        <h3 style="margin:0 0 12px 0; font-size:16px;">🌊 海洋参数</h3>
        
        <div class="control-group">
            <label>波浪高度: <span id="waveHeightVal">2.5</span></label>
            <input type="range" id="waveHeight" min="0.5" max="8" step="0.1" value="2.5">
        </div>
        
        <div class="control-group">
            <label>波浪速度: <span id="waveSpeedVal">1.0</span></label>
            <input type="range" id="waveSpeed" min="0.2" max="3" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label>风力方向 (度): <span id="windDirVal">45</span></label>
            <input type="range" id="windDir" min="0" max="360" step="5" value="45">
        </div>
        
        <div class="control-group">
            <label>泡沫强度: <span id="foamVal">0.6</span></label>
            <input type="range" id="foam" min="0" max="1.5" step="0.05" value="0.6">
        </div>
        
        <div class="control-group">
            <label>水面颜色</label>
            <input type="color" id="waterColor" value="#0066aa">
        </div>
        
        <div style="margin-top:15px; font-size:12px; opacity:0.8;">
            WebGPU + TSL 实时着色器<br>
            高级光学：Fresnel + 泡沫 + 次表面散射
        </div>
    </div>
    
    <div id="status">WebGPU 状态: 检测中...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let renderer, scene, camera, controls;
        let waterMesh, waterMaterial;
        let time = 0;
        let autoRotate = false;
        let ripples = [];

        const params = {
            waveHeight: 2.5,
            waveSpeed: 1.0,
            windDirection: 45,
            foamIntensity: 0.6,
            waterColor: '#0066aa'
        };

        async function init() {
            const statusEl = document.getElementById('status');
            
            // WebGPU 检查
            if (!navigator.gpu) {
                statusEl.textContent = '❌ 您的浏览器不支持 WebGPU，请使用最新 Chrome/Edge';
                statusEl.style.color = '#f44';
                // 降级到 WebGL 版本（简单 Gerstner）
                initWebGLFallback();
                return;
            }

            try {
                renderer = new THREE.WebGPURenderer({ 
                    antialias: true, 
                    alpha: true,
                    powerPreference: 'high-performance'
                });
                await renderer.init();
                statusEl.textContent = '✅ WebGPU + TSL 已启用';
                statusEl.style.color = '#0f0';
            } catch (e) {
                statusEl.textContent = '⚠️ WebGPU 初始化失败，使用 WebGL 降级版';
                statusEl.style.color = '#fa0';
                initWebGLFallback();
                return;
            }

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x88aadd, 200, 600);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 2000);
            camera.position.set(0, 35, 85);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.maxPolarAngle = Math.PI * 0.95;
            controls.minDistance = 10;
            controls.maxDistance = 400;

            // 灯光
            const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.8);
            sunLight.position.set(80, 120, 60);
            scene.add(sunLight);
            
            const ambient = new THREE.AmbientLight(0x445566, 0.6);
            scene.add(ambient);

            // 天空盒（简单渐变）
            const skyGeo = new THREE.SphereGeometry(900, 32, 32);
            const skyMat = new THREE.MeshBasicMaterial({ 
                color: 0x88ccff, 
                side: THREE.BackSide,
                fog: false 
            });
            const sky = new THREE.Mesh(skyGeo, skyMat);
            scene.add(sky);

            // 创建 TSL 水面
            createTSLWater();

            // 事件监听
            setupControls();
            setupInteractions();

            window.addEventListener('resize', onResize);
            
            // 初始参数同步
            updateWaterParams();

            animate();
        }

        function createTSLWater() {
            const geometry = new THREE.PlaneGeometry(280, 280, 256, 256);
            
            // 使用 TSL 创建高级水面材质
            waterMaterial = new THREE.MeshStandardMaterial({
                color: params.waterColor,
                metalness: 0.1,
                roughness: 0.15,
                envMapIntensity: 0.6,
                flatShading: false
            });

            // TSL 着色器增强（Three.js 0.170+ 支持）
            // 这里使用 onBeforeCompile 注入 TSL 风格的自定义着色（兼容性更好）
            waterMaterial.onBeforeCompile = (shader) => {
                shader.uniforms.time = { value: 0 };
                shader.uniforms.waveHeight = { value: params.waveHeight };
                shader.uniforms.waveSpeed = { value: params.waveSpeed };
                shader.uniforms.windDir = { value: params.windDirection * Math.PI / 180 };
                shader.uniforms.foamIntensity = { value: params.foamIntensity };

                // 顶点着色器 - Gerstner 波浪 (TSL 风格)
                shader.vertexShader = shader.vertexShader.replace(
                    '#include <begin_vertex>',
                    `
                    #include <begin_vertex>
                    
                    float time = time;
                    float waveHeight = waveHeight;
                    float waveSpeed = waveSpeed;
                    float windDir = windDir;
                    
                    vec2 wind = vec2(cos(windDir), sin(windDir));
                    
                    // 多层 Gerstner 波浪 (更真实)
                    float y = 0.0;
                    float steepness = 0.6;
                    
                    // 主波
                    float k1 = 0.08;
                    float w1 = sqrt(9.8 * k1);
                    float phase1 = dot(wind * k1, position.xz) - w1 * time * waveSpeed;
                    y += waveHeight * 0.6 * sin(phase1);
                    
                    // 次波
                    float k2 = 0.15;
                    float w2 = sqrt(9.8 * k2);
                    float phase2 = dot(wind * k2 * 1.3, position.xz) - w2 * time * waveSpeed * 1.15;
                    y += waveHeight * 0.35 * sin(phase2);
                    
                    // 细节波
                    float k3 = 0.28;
                    float w3 = sqrt(9.8 * k3);
                    float phase3 = dot(wind * k3 * 0.7, position.xz) - w3 * time * waveSpeed * 0.85;
                    y += waveHeight * 0.15 * sin(phase3);
                    
                    // 涟漪效果
                    for(int i = 0; i < 4; i++) {
                        if(ripples[i].w > 0.0) {
                            float dist = distance(position.xz, ripples[i].xy);
                            float ripplePhase = dist * 2.5 - ripples[i].z * 8.0;
                            y += ripples[i].w * 1.8 * exp(-dist * 0.035) * sin(ripplePhase);
                        }
                    }
                    
                    transformed.y = y;
                    `
                );

                // 片元着色器 - 高级光学效果
                shader.fragmentShader = shader.fragmentShader.replace(
                    '#include <dithering_fragment>',
                    `
                    #include <dithering_fragment>
                    
                    // Fresnel 反射
                    vec3 viewDir = normalize(vViewPosition);
                    float fresnel = pow(1.0 - max(dot(normalize(vNormal), viewDir), 0.0), 3.5);
                    
                    // 泡沫 (基于法线和高度)
                    float foam = smoothstep(0.6, 1.4, abs(sin(transformed.y * 1.8 + time * 2.0))) * foamIntensity;
                    foam *= smoothstep(1.8, 4.5, transformed.y + 2.0);
                    
                    // 次表面散射 (简单模拟)
                    float subsurface = pow(max(0.0, dot(normalize(vNormal), vec3(0.0,1.0,0.0))), 2.0) * 0.4;
                    
                    // 最终颜色混合
                    vec3 deepColor = vec3(0.02, 0.15, 0.35);
                    vec3 foamColor = vec3(0.95, 0.97, 1.0);
                    vec3 waterColorFinal = mix(deepColor, vec3(0.1, 0.45, 0.75), fresnel * 0.6 + 0.3);
                    
                    gl_FragColor.rgb = mix(waterColorFinal, foamColor, foam * 0.7);
                    gl_FragColor.rgb += subsurface * vec3(0.3, 0.6, 0.9) * 0.35;
                    gl_FragColor.a = 0.92;
                    `
                );
            };

            waterMesh = new THREE.Mesh(geometry, waterMaterial);
            waterMesh.rotation.x = -Math.PI * 0.5;
            waterMesh.receiveShadow = true;
            scene.add(waterMesh);

            // 保存 uniform 引用
            waterMesh.userData.shader = waterMaterial;
        }

        function updateWaterParams() {
            if (!waterMesh || !waterMesh.userData.shader) return;
            
            const mat = waterMesh.userData.shader;
            if (mat.uniforms) {
                mat.uniforms.waveHeight.value = params.waveHeight;
                mat.uniforms.waveSpeed.value = params.waveSpeed;
                mat.uniforms.windDir.value = params.windDirection * Math.PI / 180;
                mat.uniforms.foamIntensity.value = params.foamIntensity;
                mat.color.set(params.waterColor);
            }
        }

        function setupControls() {
            // 简单滑块绑定
            const ids = ['waveHeight', 'waveSpeed', 'windDir', 'foam'];
            ids.forEach(id => {
                const slider = document.getElementById(id);
                const valSpan = document.getElementById(id + 'Val');
                
                slider.addEventListener('input', () => {
                    params[id === 'waveHeight' ? 'waveHeight' : 
                           id === 'waveSpeed' ? 'waveSpeed' :
                           id === 'windDir' ? 'windDirection' : 'foamIntensity'] = parseFloat(slider.value);
                    valSpan.textContent = parseFloat(slider.value).toFixed(1);
                    updateWaterParams();
                });
            });

            // 水色
            document.getElementById('waterColor').addEventListener('input', (e) => {
                params.waterColor = e.target.value;
                if (waterMesh) waterMesh.material.color.set(params.waterColor);
            });

            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ') {
                    e.preventDefault();
                    autoRotate = !autoRotate;
                }
                if (e.key.toLowerCase() === 'r') {
                    // 重置相机
                    camera.position.set(0, 35, 85);
                    controls.target.set(0, 0, 0);
                    controls.update();
                }
            });
        }

        function setupInteractions() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            renderer.domElement.addEventListener('click', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(waterMesh);
                
                if (intersects.length > 0) {
                    const point = intersects[0].point;
                    // 添加涟漪
                    ripples.push({
                        x: point.x,
                        y: point.z,
                        time: time,
                        strength: 2.8
                    });
                    if (ripples.length > 6) ripples.shift();
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.016 * params.waveSpeed;

            if (waterMesh && waterMesh.userData.shader && waterMesh.userData.shader.uniforms) {
                waterMesh.userData.shader.uniforms.time.value = time;
                
                // 更新涟漪
                for (let i = ripples.length - 1; i >= 0; i--) {
                    const r = ripples[i];
                    if (time - r.time > 4.5) {
                        ripples.splice(i, 1);
                    }
                }
            }

            if (autoRotate) {
                camera.position.x = Math.sin(time * 0.12) * 95;
                camera.position.z = Math.cos(time * 0.12) * 95 + 20;
                camera.lookAt(0, 0, 0);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // WebGL 降级版本（简单但可用）
        function initWebGLFallback() {
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 2000);
            camera.position.set(0, 35, 85);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const sun = new THREE.DirectionalLight(0xfff5e6, 1.5);
            sun.position.set(80, 120, 60);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x445566, 0.5));

            const geometry = new THREE.PlaneGeometry(280, 280, 128, 128);
            const material = new THREE.MeshPhongMaterial({
                color: params.waterColor,
                shininess: 85,
                specular: 0x112244,
                flatShading: false
            });

            waterMesh = new THREE.Mesh(geometry, material);
            waterMesh.rotation.x = -Math.PI * 0.5;
            scene.add(waterMesh);

            // 简单波浪动画
            function animateFallback() {
                requestAnimationFrame(animateFallback);
                time += 0.016;

                const pos = waterMesh.geometry.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    const z = pos.getZ(i);
                    let y = Math.sin(x * 0.07 + time) * params.waveHeight * 0.6 +
                            Math.sin(z * 0.09 + time * 1.3) * params.waveHeight * 0.4;
                    pos.setY(i, y);
                }
                pos.needsUpdate = true;
                waterMesh.geometry.computeVertexNormals();

                if (autoRotate) {
                    camera.position.x = Math.sin(time * 0.1) * 90;
                    camera.position.z = Math.cos(time * 0.1) * 90;
                    camera.lookAt(0, 0, 0);
                }
                controls.update();
                renderer.render(scene, camera);
            }
            animateFallback();
            
            // 绑定控制
            setupControls();
            document.getElementById('status').textContent = '⚠️ 使用 WebGL 降级版（波浪效果简化）';
        }

        // 启动
        init();
    </script>
</body>
</html>
