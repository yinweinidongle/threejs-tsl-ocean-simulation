<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07131f">
  <link rel="icon" href="data:,">
  <title>Three.js 远洋模拟</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #07131f; color: #eef8ff; }
    canvas { display: block; width: 100%; height: 100%; }
    .glass { position: fixed; z-index: 2; border: 1px solid rgba(170,220,255,.16); background: rgba(4,17,29,.68); box-shadow: 0 20px 50px rgba(0,0,0,.24); backdrop-filter: blur(18px); }
    #intro { top: 24px; left: 24px; max-width: 420px; padding: 18px 20px; border-radius: 16px; pointer-events: none; }
    #intro h1 { margin: 0 0 6px; font-size: clamp(20px,2.2vw,30px); letter-spacing: -.03em; }
    #intro p { margin: 0; color: #a8c7da; font-size: 13px; line-height: 1.7; }
    #panel { top: 24px; right: 24px; width: min(300px,calc(100vw - 48px)); padding: 20px; border-radius: 18px; }
    #panel h2 { margin: 0 0 18px; font-size: 15px; letter-spacing: .08em; text-transform: uppercase; color: #cdeeff; }
    .row { margin: 0 0 16px; }
    .row label { display: flex; justify-content: space-between; margin-bottom: 8px; color: #a8c7da; font-size: 12px; }
    .row output { color: #eefaff; font-variant-numeric: tabular-nums; }
    input[type="range"] { width: 100%; height: 4px; appearance: none; border-radius: 999px; background: rgba(172,216,238,.2); accent-color: #56c8ff; }
    input[type="range"]::-webkit-slider-thumb { width: 16px; height: 16px; appearance: none; border: 2px solid #d9f5ff; border-radius: 50%; background: #24aee9; box-shadow: 0 0 18px #2cbcff; }
    input[type="color"] { width: 38px; height: 26px; padding: 2px; border: 1px solid rgba(255,255,255,.25); border-radius: 7px; background: transparent; }
    .color-row { display: flex; align-items: center; justify-content: space-between; color: #a8c7da; font-size: 12px; }
    #status { position: fixed; z-index: 3; left: 24px; bottom: 22px; display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(2,14,25,.72); color: #b7d5e5; font-size: 11px; backdrop-filter: blur(12px); }
    #status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #f5be56; box-shadow: 0 0 10px currentColor; }
    #status.ready::before { background: #55e6a5; }
    #error { display: none; position: fixed; z-index: 4; inset: 50% auto auto 50%; width: min(520px,calc(100vw - 40px)); padding: 22px; transform: translate(-50%,-50%); border: 1px solid #a94b4b; border-radius: 16px; background: #1c1115; color: #ffd7d7; }
    @media (max-width: 700px) { #intro { top: 14px; left: 14px; right: 14px; padding: 14px 16px; } #intro p { display: none; } #panel { top: auto; right: 14px; bottom: 14px; left: 14px; width: auto; padding: 14px 16px; } #panel h2 { margin-bottom: 10px; } .row { margin-bottom: 10px; } #status { display: none; } }
  </style>
</head>
<body>
  <section id="intro" class="glass">
    <h1>Open Ocean</h1>
    <p>拖动旋转 · 滚轮缩放 · 空格切换自动巡航 · R 重置视角<br>实时反射、动态法线与大气散射共同构成远洋光照</p>
  </section>
  <aside id="panel" class="glass">
    <h2>Ocean controls</h2>
    <div class="row"><label for="waveHeight">波浪扭曲 <output id="waveHeightVal">3.7</output></label><input id="waveHeight" type="range" min="0" max="8" step="0.1" value="3.7"></div>
    <div class="row"><label for="waveSpeed">波浪速度 <output id="waveSpeedVal">1.0</output></label><input id="waveSpeed" type="range" min="0.2" max="3" step="0.1" value="1"></div>
    <div class="row"><label for="windDir">太阳方位 <output id="windDirVal">180°</output></label><input id="windDir" type="range" min="-180" max="180" step="1" value="180"></div>
    <div class="row"><label for="foam">波纹尺度 <output id="foamVal">1.0</output></label><input id="foam" type="range" min="0.1" max="10" step="0.1" value="1"></div>
    <div class="color-row"><label for="waterColor">深水颜色</label><input id="waterColor" type="color" value="#075985"></div>
  </aside>
  <div id="status">正在初始化渲染器…</div>
  <div id="error"></div>

  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"}}
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Water } from 'three/addons/objects/Water.js';
    import { Sky } from 'three/addons/objects/Sky.js';

    const params = { distortion: 3.7, speed: 1, azimuth: 180, size: 1, waterColor: '#075985', elevation: 3.5 };
    const state = { autoRotate: false };
    const status = document.querySelector('#status');
    const errorBox = document.querySelector('#error');
    let renderer, scene, camera, controls, water, sky, environment;
    const sun = new THREE.Vector3();
    const timer = new THREE.Timer();

    async function init() {
      renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 1.75));
      renderer.setSize(innerWidth, innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = .55;
      document.body.prepend(renderer.domElement);

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 1, 20000);
      camera.position.set(30, 30, 100);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = .055;
      controls.minDistance = 40;
      controls.maxDistance = 200;
      controls.maxPolarAngle = Math.PI * .495;
      controls.target.set(0, 10, 0);
      controls.update();

      createOcean();
      createSky();
      updateSun();
      bindControls();
      addEventListener('resize', resize);
      addEventListener('keydown', onKey);

      status.textContent = 'WebGL · 实时反射海洋运行中';
      status.classList.add('ready');
      renderer.setAnimationLoop(render);
    }

    function createOcean() {
      const normals = new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg');
      normals.wrapS = normals.wrapT = THREE.RepeatWrapping;
      water = new Water(new THREE.PlaneGeometry(10000, 10000), {
        textureWidth: 512,
        textureHeight: 512,
        waterNormals: normals,
        sunDirection: new THREE.Vector3(),
        sunColor: 0xffffff,
        waterColor: new THREE.Color(params.waterColor),
        distortionScale: params.distortion,
        fog: false
      });
      water.rotation.x = -Math.PI / 2;
      scene.add(water);
    }

    function createSky() {
      sky = new Sky();
      sky.scale.setScalar(10000);
      scene.add(sky);
      const u = sky.material.uniforms;
      u.turbidity.value = 10;
      u.rayleigh.value = 2;
      u.mieCoefficient.value = .005;
      u.mieDirectionalG.value = .8;
      if (u.cloudCoverage) { u.cloudCoverage.value = .28; u.cloudDensity.value = .35; u.cloudElevation.value = .45; }
    }

    function updateSun() {
      const phi = THREE.MathUtils.degToRad(90 - params.elevation);
      const theta = THREE.MathUtils.degToRad(params.azimuth);
      sun.setFromSphericalCoords(1, phi, theta);
      sky.material.uniforms.sunPosition.value.copy(sun);
      water.material.uniforms.sunDirection.value.copy(sun).normalize();
      environment?.dispose();
      const pmrem = new THREE.PMREMGenerator(renderer);
      const environmentScene = new THREE.Scene();
      environmentScene.add(sky);
      environment = pmrem.fromScene(environmentScene);
      scene.add(sky);
      scene.environment = environment.texture;
      pmrem.dispose();
    }

    function bindControls() {
      document.querySelector('#waveHeight').addEventListener('input', e => { params.distortion = Number(e.target.value); water.material.uniforms.distortionScale.value = params.distortion; document.querySelector('#waveHeightVal').value = params.distortion.toFixed(1); });
      document.querySelector('#waveSpeed').addEventListener('input', e => { params.speed = Number(e.target.value); document.querySelector('#waveSpeedVal').value = params.speed.toFixed(1); });
      document.querySelector('#foam').addEventListener('input', e => { params.size = Number(e.target.value); water.material.uniforms.size.value = params.size; document.querySelector('#foamVal').value = params.size.toFixed(1); });
      document.querySelector('#windDir').addEventListener('input', e => {
        params.azimuth = Number(e.target.value); document.querySelector('#windDirVal').value = `${params.azimuth}°`; updateSun();
      });
      document.querySelector('#waterColor').addEventListener('input', e => {
        params.waterColor = e.target.value; water.material.uniforms.waterColor.value.set(params.waterColor);
      });
    }

    function onKey(event) {
      if (event.code === 'Space') { event.preventDefault(); state.autoRotate = !state.autoRotate; }
      if (event.key.toLowerCase() === 'r') { camera.position.set(30, 30, 100); controls.target.set(0, 10, 0); controls.update(); }
    }
    function resize() { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); }
    function render() {
      timer.update();
      water.material.uniforms.time.value += Math.min(timer.getDelta(), .05) * params.speed;
      if (sky.material.uniforms.time) sky.material.uniforms.time.value = performance.now() * .001;
      controls.autoRotate = state.autoRotate;
      controls.autoRotateSpeed = .6;
      controls.update();
      renderer.render(scene, camera);
    }

    init().catch(error => {
      console.error(error);
      status.textContent = '渲染初始化失败';
      errorBox.style.display = 'block';
      errorBox.innerHTML = `<strong>无法启动海洋模拟</strong><br><br>${String(error.message || error)}<br><br>请使用支持 WebGL 2 的最新版 Chrome、Edge 或 Firefox。`;
    });
  </script>
</body>
</html>
