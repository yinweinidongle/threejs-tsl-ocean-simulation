<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07131f">
  <title>Three.js TSL 海洋模拟</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #07131f; color: #eef8ff; }
    canvas { display: block; width: 100%; height: 100%; }
    .glass { position: fixed; z-index: 2; border: 1px solid rgba(170,220,255,.16); background: rgba(4,17,29,.68); box-shadow: 0 20px 50px rgba(0,0,0,.24); backdrop-filter: blur(18px); }
    #intro { top: 24px; left: 24px; max-width: 420px; padding: 18px 20px; border-radius: 16px; pointer-events: none; }
    #intro h1 { margin: 0 0 6px; font-size: clamp(20px,2.2vw,30px); letter-spacing: -.03em; }
    #intro p { margin: 0; color: #a8c7da; font-size: 13px; line-height: 1.7; }
    #panel { top: 24px; right: 24px; width: min(300px,calc(100vw - 48px)); padding: 20px; border-radius: 18px; }
    #panel h2 { margin: 0 0 18px; font-size: 15px; letter-spacing: .08em; text-transform: uppercase; color: #cdeeff; }
    .row { margin: 0 0 16px; }
    .row label { display: flex; justify-content: space-between; margin-bottom: 8px; color: #a8c7da; font-size: 12px; }
    .row output { color: #eefaff; font-variant-numeric: tabular-nums; }
    input[type="range"] { width: 100%; height: 4px; appearance: none; border-radius: 999px; background: rgba(172,216,238,.2); accent-color: #56c8ff; }
    input[type="range"]::-webkit-slider-thumb { width: 16px; height: 16px; appearance: none; border: 2px solid #d9f5ff; border-radius: 50%; background: #24aee9; box-shadow: 0 0 18px #2cbcff; }
    input[type="color"] { width: 38px; height: 26px; padding: 2px; border: 1px solid rgba(255,255,255,.25); border-radius: 7px; background: transparent; }
    .color-row { display: flex; align-items: center; justify-content: space-between; color: #a8c7da; font-size: 12px; }
    #status { position: fixed; z-index: 3; left: 24px; bottom: 22px; display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(2,14,25,.72); color: #b7d5e5; font-size: 11px; backdrop-filter: blur(12px); }
    #status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #f5be56; box-shadow: 0 0 10px currentColor; }
    #status.ready::before { background: #55e6a5; }
    #error { display: none; position: fixed; z-index: 4; inset: 50% auto auto 50%; width: min(520px,calc(100vw - 40px)); padding: 22px; transform: translate(-50%,-50%); border: 1px solid #a94b4b; border-radius: 16px; background: #1c1115; color: #ffd7d7; }
    @media (max-width: 700px) { #intro { top: 14px; left: 14px; right: 14px; padding: 14px 16px; } #intro p { display: none; } #panel { top: auto; right: 14px; bottom: 14px; left: 14px; width: auto; padding: 14px 16px; } #panel h2 { margin-bottom: 10px; } .row { margin-bottom: 10px; } #status { display: none; } }
  </style>
</head>
<body>
  <section id="intro" class="glass">
    <h1>TSL Ocean Lab</h1>
    <p>拖动旋转 · 滚轮缩放 · 空格切换自动巡航 · R 重置视角<br>由 Three.js WebGPU Renderer 与 TSL 节点材质实时驱动</p>
  </section>
  <aside id="panel" class="glass">
    <h2>Ocean controls</h2>
    <div class="row"><label for="waveHeight">波浪高度 <output id="waveHeightVal">2.5</output></label><input id="waveHeight" type="range" min="0.5" max="7" step="0.1" value="2.5"></div>
    <div class="row"><label for="waveSpeed">波浪速度 <output id="waveSpeedVal">1.0</output></label><input id="waveSpeed" type="range" min="0.2" max="3" step="0.1" value="1"></div>
    <div class="row"><label for="windDir">风向 <output id="windDirVal">45°</output></label><input id="windDir" type="range" min="0" max="360" step="5" value="45"></div>
    <div class="row"><label for="foam">泡沫强度 <output id="foamVal">0.6</output></label><input id="foam" type="range" min="0" max="1.4" step="0.05" value="0.6"></div>
    <div class="color-row"><label for="waterColor">深水颜色</label><input id="waterColor" type="color" value="#075985"></div>
  </aside>
  <div id="status">正在初始化渲染器…</div>
  <div id="error"></div>

  <script type="importmap">
  {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js","three/webgpu":"https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js","three/tsl":"https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.tsl.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"}}
  </script>
  <script type="module">
    import * as THREE from 'three/webgpu';
    import { color, mix, positionLocal, sin, smoothstep, uniform, vec3 } from 'three/tsl';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const params = { waveHeight: 2.5, waveSpeed: 1, windDirection: 45, foamIntensity: .6, waterColor: '#075985' };
    const state = { autoRotate: false };
    const status = document.querySelector('#status');
    const errorBox = document.querySelector('#error');
    let renderer, scene, camera, controls, water;

    const timeNode = uniform(0);
    const heightNode = uniform(params.waveHeight);
    const speedNode = uniform(params.waveSpeed);
    const windNode = uniform(THREE.MathUtils.degToRad(params.windDirection));
    const foamNode = uniform(params.foamIntensity);
    const deepColorNode = uniform(new THREE.Color(params.waterColor));

    async function init() {
      renderer = new THREE.WebGPURenderer({ antialias: true, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 1.75));
      renderer.setSize(innerWidth, innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      await renderer.init();
      document.body.prepend(renderer.domElement);

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x07131f);
      scene.fog = new THREE.FogExp2(0x8bb8cc, .0034);
      camera = new THREE.PerspectiveCamera(56, innerWidth / innerHeight, .1, 1200);
      camera.position.set(58, 42, 82);
      camera.lookAt(0, 0, 0);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = .055;
      controls.minDistance = 24;
      controls.maxDistance = 260;
      controls.maxPolarAngle = Math.PI * .49;
      controls.target.set(0, 0, 0);
      controls.update();

      scene.add(new THREE.HemisphereLight(0xbde9ff, 0x09253b, 2.4));
      const sun = new THREE.DirectionalLight(0xffe0b0, 3.2);
      sun.position.set(-60, 90, 30);
      scene.add(sun);
      createSky();
      createOcean();
      bindControls();
      addEventListener('resize', resize);
      addEventListener('keydown', onKey);

      const backend = navigator.gpu ? 'WebGPU' : 'WebGL 2 fallback';
      status.textContent = `${backend} · TSL 节点材质运行中`;
      status.classList.add('ready');
      renderer.setAnimationLoop(render);
    }

    function createSky() {
      const geometry = new THREE.SphereGeometry(650, 32, 16);
      const material = new THREE.MeshBasicMaterial({ color: 0x8cc8df, side: THREE.BackSide, fog: false });
      scene.add(new THREE.Mesh(geometry, material));
    }

    function createOcean() {
      const geometry = new THREE.PlaneGeometry(420, 420, 220, 220);
      geometry.rotateX(-Math.PI / 2);
      const x = positionLocal.x;
      const z = positionLocal.z;
      const wx = windNode.cos();
      const wz = windNode.sin();
      const alongWind = x.mul(wx).add(z.mul(wz));
      const acrossWind = x.mul(wz.negate()).add(z.mul(wx));
      const t = timeNode.mul(speedNode);
      const waveA = sin(alongWind.mul(.072).sub(t.mul(1.15))).mul(heightNode.mul(.58));
      const waveB = sin(acrossWind.mul(.13).add(t.mul(1.62))).mul(heightNode.mul(.27));
      const waveC = sin(x.add(z).mul(.245).sub(t.mul(2.1))).mul(heightNode.mul(.1));
      const elevation = waveA.add(waveB).add(waveC);

      const material = new THREE.MeshStandardNodeMaterial({ metalness: .08, roughness: .2, side: THREE.DoubleSide });
      material.positionNode = vec3(x, elevation, z);
      const crest = smoothstep(heightNode.mul(.42), heightNode.mul(.82), elevation).mul(foamNode);
      material.colorNode = mix(deepColorNode, color(0x83d9ed), crest);
      material.roughnessNode = mix(uniform(.18), uniform(.62), crest);
      water = new THREE.Mesh(geometry, material);
      scene.add(water);
    }

    function bindControls() {
      const bindings = {
        waveHeight: [heightNode, 'waveHeightVal', v => v.toFixed(1)],
        waveSpeed: [speedNode, 'waveSpeedVal', v => v.toFixed(1)],
        foam: [foamNode, 'foamVal', v => v.toFixed(2)]
      };
      for (const [id, [node, outputId, format]] of Object.entries(bindings)) {
        document.querySelector(`#${id}`).addEventListener('input', e => {
          const value = Number(e.target.value); params[id === 'foam' ? 'foamIntensity' : id] = value;
          node.value = value; document.querySelector(`#${outputId}`).value = format(value);
        });
      }
      document.querySelector('#windDir').addEventListener('input', e => {
        params.windDirection = Number(e.target.value); windNode.value = THREE.MathUtils.degToRad(params.windDirection);
        document.querySelector('#windDirVal').value = `${params.windDirection}°`;
      });
      document.querySelector('#waterColor').addEventListener('input', e => {
        params.waterColor = e.target.value; deepColorNode.value.set(params.waterColor);
      });
    }

    function onKey(event) {
      if (event.code === 'Space') { event.preventDefault(); state.autoRotate = !state.autoRotate; }
      if (event.key.toLowerCase() === 'r') { camera.position.set(58, 42, 82); controls.target.set(0, 0, 0); controls.update(); }
    }
    function resize() { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); }
    function render(timestamp) {
      timeNode.value = timestamp * .001;
      controls.autoRotate = state.autoRotate;
      controls.autoRotateSpeed = .6;
      controls.update();
      renderer.render(scene, camera);
    }

    init().catch(error => {
      console.error(error);
      status.textContent = '渲染初始化失败';
      errorBox.style.display = 'block';
      errorBox.innerHTML = `<strong>无法启动海洋模拟</strong><br><br>${String(error.message || error)}<br><br>请使用支持 WebGL 2 的最新版 Chrome、Edge 或 Firefox。`;
    });
  </script>
</body>
</html>
